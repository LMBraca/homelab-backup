<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nextcloud Backup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --surface2:#22263a;
    --border:  rgba(255,255,255,0.08);
    --text:    #e2e4f0;
    --muted:   #6b7280;
    --success: #22c55e;
    --danger:  #ef4444;
    --blue:    #378add;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; min-height:100vh; padding-bottom:40px; }
  header { padding:22px 32px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:17px; font-weight:600; display:flex; align-items:center; gap:10px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--success); flex-shrink:0; }
  .dot.running { background:var(--blue); animation:pulse 1.2s ease-in-out infinite; }
  .dot.error   { background:var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .last-poll { font-size:12px; color:var(--muted); }
  main { padding:26px 32px; max-width:860px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px 26px; margin-bottom:16px; }
  .card.success { border-color:rgba(34,197,94,.3); }
  .card.running { border-color:rgba(55,138,221,.4); }
  .card.failed  { border-color:rgba(239,68,68,.4); }
  .card-header  { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .card-label   { font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); }
  .badge { font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; }
  .badge-success { background:rgba(34,197,94,.15); color:var(--success); }
  .badge-running { background:rgba(55,138,221,.15); color:var(--blue); }
  .badge-failed  { background:rgba(239,68,68,.12);  color:var(--danger); }
  .badge-unknown { background:rgba(255,255,255,.06); color:var(--muted); }
  .metrics { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
  .metric { background:var(--surface2); border-radius:10px; padding:14px 16px; }
  .metric-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .metric-value { font-size:20px; font-weight:600; line-height:1; }
  .metric-sub   { font-size:11px; color:var(--muted); margin-top:4px; }
  .progress-wrap { margin-bottom:14px; }
  .progress-info { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .progress-bar  { height:6px; background:var(--surface2); border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--blue); border-radius:4px; transition:width .4s; }
  .progress-fill.indeterminate { width:40%!important; animation:slide 1.5s ease-in-out infinite; }
  @keyframes slide { 0%{margin-left:0} 50%{margin-left:60%} 100%{margin-left:0} }
  .mono { font-size:12px; color:var(--muted); font-family:monospace; background:var(--surface2); border-radius:8px; padding:10px 14px; word-break:break-all; }
  .section-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin:14px 0 6px; }
  .error-box { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25); border-radius:10px; padding:12px 16px; font-size:13px; color:#fca5a5; font-family:monospace; margin-bottom:14px; word-break:break-all; }
  .step-pill { display:inline-flex; align-items:center; gap:6px; background:rgba(55,138,221,.12); color:var(--blue); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:500; }
  .step-pill::before { content:''; display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--blue); animation:pulse 1s ease-in-out infinite; }
  .next-countdown { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1><span class="dot" id="hd"></span>Nextcloud Backup — bracasbck</h1>
  <span class="last-poll" id="poll">Loading…</span>
</header>
<main id="root"></main>

<script>
const CRON_H = 10, CRON_M = 50;

const fmt = {
  dur: s => s < 60 ? s+'s' : s < 3600 ? Math.floor(s/60)+'m '+s%60+'s' : Math.floor(s/3600)+'h '+Math.floor(s%3600/60)+'m',
  ago: ep => {
    const d = Math.floor(Date.now()/1000 - ep);
    return d<60?d+'s ago':d<3600?Math.floor(d/60)+'m ago':d<86400?Math.floor(d/3600)+'h ago':Math.floor(d/86400)+'d ago';
  },
  next: () => {
    const n=new Date(), t=new Date(n);
    t.setHours(CRON_H,CRON_M,0,0);
    if(t<=n) t.setDate(t.getDate()+1);
    const s=Math.floor((t-n)/1000), h=Math.floor(s/3600), m=Math.floor(s%3600/60);
    return { time:`${String(CRON_H).padStart(2,'0')}:${String(CRON_M).padStart(2,'0')} daily`, cd:`in ${h}h ${m}m` };
  }
};

const badge = (cls,txt) => `<span class="badge badge-${cls}">${txt}</span>`;

function liveCard(d) {
  document.getElementById('hd').className = 'dot running';
  const el = Math.floor(Date.now()/1000 - d.startedAtEpoch);
  const pct = d.transferPercent ? parseInt(d.transferPercent) : null;
  const det = pct !== null && pct > 0;
  return `<div class="card running">
    <div class="card-header"><span class="card-label">Backup in progress</span>${badge('running','Running')}</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Step</div><div class="step-pill">${d.step}</div></div>
      <div class="metric"><div class="metric-label">Elapsed</div><div class="metric-value">${fmt.dur(el)}</div></div>
      <div class="metric"><div class="metric-label">Started</div><div class="metric-value" style="font-size:14px">${d.startedAt}</div></div>
      ${d.transferSpeed?`<div class="metric"><div class="metric-label">Speed</div><div class="metric-value" style="font-size:16px">${d.transferSpeed}</div></div>`:''}
      ${d.transferEta?`<div class="metric"><div class="metric-label">ETA</div><div class="metric-value" style="font-size:16px">${d.transferEta}</div></div>`:''}
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span>${det?d.transferPercent:'Transferring…'}</span></div>
      <div class="progress-bar"><div class="progress-fill ${det?'':'indeterminate'}" style="${det?'width:'+pct+'%':''}"></div></div>
    </div>
    ${d.currentFile?`<div class="section-label">Current file</div><div class="mono">${d.currentFile}</div>`:''}
    ${d.noisyAppdataPreview>0||d.noisyAppdataOther>0?`<div class="metrics" style="margin-top:12px">
      <div class="metric"><div class="metric-label">Preview files</div><div class="metric-value">${d.noisyAppdataPreview.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">Other appdata</div><div class="metric-value">${d.noisyAppdataOther.toLocaleString()}</div></div>
    </div>`:''}
  </div>`;
}

function lastCard(d) {
  const ok = d.result === 'success';
  document.getElementById('hd').className = 'dot' + (ok ? '' : ' error');
  const db = d.dbDest || d.dbFile || '—';
  const sz = d.dbSize || d.dbFileSize || '—';
  return `<div class="card ${ok?'success':'failed'}">
    <div class="card-header"><span class="card-label">Last backup</span>${badge(ok?'success':'failed', ok?'✓ Success':'✗ Failed')}</div>
    ${d.errorLine?`<div class="error-box">${d.errorLine}</div>`:''}
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Finished</div>
        <div class="metric-value" style="font-size:14px">${d.finishedAt||'—'}</div>
        <div class="metric-sub">${d.finishedAtEpoch?fmt.ago(d.finishedAtEpoch):''}</div>
      </div>
      <div class="metric"><div class="metric-label">Duration</div><div class="metric-value">${d.durationSeconds!=null?fmt.dur(d.durationSeconds):'—'}</div></div>
      <div class="metric"><div class="metric-label">DB size</div><div class="metric-value">${sz}</div></div>
      ${d.noisyAppdataPreview>0?`<div class="metric"><div class="metric-label">Preview files</div><div class="metric-value">${d.noisyAppdataPreview.toLocaleString()}</div></div>`:''}
      ${d.noisyAppdataOther>0?`<div class="metric"><div class="metric-label">Other appdata</div><div class="metric-value">${d.noisyAppdataOther.toLocaleString()}</div></div>`:''}
    </div>
    <div class="section-label">Database backup destination</div>
    <div class="mono">${db}</div>
  </div>`;
}

function nextCard() {
  const { time, cd } = fmt.next();
  return `<div class="card">
    <div class="card-header" style="margin-bottom:0">
      <div>
        <div class="card-label">Next scheduled run</div>
        <div style="font-size:16px;font-weight:500;margin-top:4px">${time}</div>
      </div>
      <div class="next-countdown" id="ncd">${cd}</div>
    </div>
  </div>`;
}

async function fetchJson(p) {
  try { const r = await fetch(p+'?_='+Date.now()); return r.ok ? r.json() : null; }
  catch { return null; }
}

async function poll() {
  const [live, last] = await Promise.all([
    fetchJson('backup-live.json'),
    fetchJson('backup-last.json')
  ]);
  let html = '';
  if (live?.inProgress) html += liveCard(live);
  if (last) html += lastCard(last);
  else if (!live) {
    document.getElementById('hd').className = 'dot';
    html += `<div class="card"><div class="card-header"><span class="card-label">Last backup</span>${badge('unknown','No data')}</div><div style="color:var(--muted);font-size:14px;margin-top:8px">No backup has run yet.</div></div>`;
  }
  html += nextCard();
  document.getElementById('root').innerHTML = html;
  document.getElementById('poll').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

poll();
setInterval(poll, 3000);
setInterval(() => { const el=document.getElementById('ncd'); if(el) el.textContent=fmt.next().cd; }, 30000);
</script>
</body>
</html>
